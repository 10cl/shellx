name: Build Executables

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g., v1.0.0, default: Git SHA)'
        required: false

env:
  APP_NAME: 'shellx'
  # Version priority: manual input > Git branch name > first 8 chars of Git SHA
  VERSION: ${{ github.event.inputs.version || github.ref_name || github.sha }}
  MAIN_PY_FILE: 'deps/main.py'       # Main program entry point

jobs:
  # -------------------------- Build Stage: Generate executables for all platforms --------------------------
  build-windows-x86:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (32-bit)
        uses: actions/setup-python@v4
        with:
          python-version: 3.10.x
          architecture: 'x86'

      - name: Install dependencies
        run: pip install pyinstaller
        shell: pwsh

      - name: Clean previous builds
        run: Remove-Item -Recurse -Force dist, build -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Build shellx executable (32-bit)
        run: |
          pyinstaller --clean --onefile --name "${{ env.APP_NAME }}.exe" ${{ env.MAIN_PY_FILE }}
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-win-x86
          path: dist/shellx.exe
          retention-days: 1

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (64-bit)
        uses: actions/setup-python@v4
        with:
          python-version: 3.10.x
          architecture: 'x64'

      - name: Install dependencies
        run: pip install pyinstaller
        shell: pwsh

      - name: Clean previous builds
        run: Remove-Item -Recurse -Force dist, build -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Build shellx executable (64-bit)
        run: |
          pyinstaller --clean --onefile --name "${{ env.APP_NAME }}.exe" ${{ env.MAIN_PY_FILE }}
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-win-x64
          path: dist/shellx.exe
          retention-days: 1

  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - name: Check architecture
        run: |
          if [ "$(uname -m)" != "x86_64" ]; then
            echo "Unexpected architecture: $(uname -m)" && exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10.x

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Clean previous builds
        run: rm -rf dist/ build/

      - name: Build shellx executable
        run: |
          pyinstaller --clean --onefile --name "${{ env.APP_NAME }}" ${{ env.MAIN_PY_FILE }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-x86_64
          path: dist/shellx
          retention-days: 1

  build-macos-x86_64:
    runs-on: macos-15  # ARM64 runner, building x86_64 binaries via Rosetta 2
    steps:
      - name: Check architecture (ARM64 runner expected)
        run: |
          if [ "$(uname -m)" != "arm64" ]; then
            echo "Unexpected architecture: $(uname -m)" && exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install x86_64 Python via Rosetta 2
        run: |
          # Download and install x86_64 Python using Rosetta 2
          arch -x86_64 /bin/bash -c "
            echo 'Installing x86_64 Python via Rosetta 2...'
            curl -fsSL https://www.python.org/ftp/python/3.10.11/python-3.10.11-macosx10.9.pkg -o python.pkg
            sudo installer -pkg python.pkg -target /
            export PATH=/usr/local/bin:/Library/Frameworks/Python.framework/Versions/3.10/bin:$PATH
            python3 --version
            python3 -m pip install --upgrade pip
            python3 -m pip install pyinstaller
          "

      - name: Clean previous builds
        run: rm -rf dist/ build/

      - name: Build shellx executable (x86_64)
        run: |
          # Force x86_64 architecture using Rosetta 2
          arch -x86_64 /bin/bash -c "
            export PATH=/usr/local/bin:/Library/Frameworks/Python.framework/Versions/3.10/bin:$PATH
            cd $(pwd)
            pyinstaller --clean --onefile --name '${{ env.APP_NAME }}' ${{ env.MAIN_PY_FILE }}
          "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-x86_64
          path: dist/shellx
          retention-days: 1

  build-macos-aarch64:
    runs-on: macos-latest  # Apple Silicon (aarch64)
    steps:
      - name: Check architecture
        run: |
          if [ "$(uname -m)" != "arm64" ]; then
            echo "Unexpected architecture: $(uname -m)" && exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10.x

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Clean previous builds
        run: rm -rf dist/ build/

      - name: Build shellx executable
        run: |
          pyinstaller --clean --onefile --name "${{ env.APP_NAME }}" ${{ env.MAIN_PY_FILE }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-aarch64
          path: dist/shellx
          retention-days: 1

  # -------------------------- Packaging Stage: Create single package with all platforms --------------------------
  package-all:
    needs:
      - build-windows-x86
      - build-windows-x64
      - build-linux-x86_64
      - build-macos-x86_64
      - build-macos-aarch64
    runs-on: ubuntu-latest
    steps:
      - name: Create package directory
        run: |
          mkdir -p shellx-all
          cd shellx-all
          mkdir -p windows-x86 windows-x64 linux-x86_64 macos-x86_64 macos-aarch64

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: shellx-all/

      - name: Organize files by platform
        run: |
          cd shellx-all

          # Move executables to platform-specific directories
          mv build-win-x86/shellx.exe windows-x86/
          mv build-win-x64/shellx.exe windows-x64/
          mv build-linux-x86_64/shellx linux-x86_64/
          mv build-macos-x86_64/shellx macos-x86_64/
          mv build-macos-aarch64/shellx macos-aarch64/

          # Remove empty artifact directories
          rm -rf build-*

          # Fix permissions for Unix executables
          chmod +x linux-x86_64/shellx macos-x86_64/shellx macos-aarch64/shellx

          # Create README
          cat > README.txt << 'EOF'
ShellX - USB Device Auto-Deployment Daemon
==========================================

This package contains executables for all platforms:

Platform Directory Structure:
  windows-x86/      - Windows 32-bit (shellx.exe)
  windows-x64/      - Windows 64-bit (shellx.exe)
  linux-x86_64/     - Linux x86_64 (shellx)
  macos-x86_64/     - macOS Intel (shellx)
  macos-aarch64/    - macOS Apple Silicon (shellx)

Usage:
  - Windows: Run the appropriate .exe file directly
  - Linux/macOS: Make the file executable and run:
      chmod +x shellx
      ./shellx

For more information, visit: https://shellx.ai
Version: ${{ env.VERSION }}
EOF

          # Display final directory structure
          echo "Final package structure:"
          ls -la

      - name: Create unified package
        run: |
          VERSION=${{ env.VERSION }}
          ZIP_NAME="${{ env.APP_NAME }}-all-${VERSION}.zip"
          zip -r ${ZIP_NAME} shellx-all/*
          echo "Created package: ${ZIP_NAME}"
          ls -lh ${ZIP_NAME}

      - name: Generate checksums
        run: |
          ZIP_NAME="${{ env.APP_NAME }}-all-${{ env.VERSION }}.zip"
          sha256sum ${ZIP_NAME} > ${ZIP_NAME}.sha256
          echo "Checksum:"
          cat ${ZIP_NAME}.sha256

      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-all-${{ env.VERSION }}
          path: |
            *.zip
            *.sha256
          retention-days: 30
