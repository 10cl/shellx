name: Build Executables

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g., v1.0.0, default: Git SHA)'
        required: false

env:
  APP_NAME: 'shellx'
  # Version priority: manual input > Git branch name > first 8 chars of Git SHA
  VERSION: ${{ github.event.inputs.version || github.ref_name || github.sha }}
  MAIN_PY_FILE: 'deps/main.py'       # Main program entry point

jobs:
  # -------------------------- Build Stage: Generate intermediate artifacts by OS + architecture --------------------------
  build-windows-x86:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (32-bit)
        uses: actions/setup-python@v4
        with:
          python-version: 3.10.x
          architecture: 'x86'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          choco install zip -y
        shell: pwsh

      - name: Clean previous builds
        run: |
          Remove-Item -Recurse -Force dist, build -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Build shellx executable (32-bit)
        run: |
          pyinstaller --clean --onefile --name "${{ env.APP_NAME }}.exe" ${{ env.MAIN_PY_FILE }}
        shell: bash

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-win-x86
          path: dist/
          retention-days: 1

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (64-bit)
        uses: actions/setup-python@v4
        with:
          python-version: 3.10.x
          architecture: 'x64'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          choco install zip -y
        shell: pwsh

      - name: Clean previous builds
        run: |
          Remove-Item -Recurse -Force dist, build -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Build shellx executable (64-bit)
        run: |
          pyinstaller --clean --onefile --name "${{ env.APP_NAME }}.exe" ${{ env.MAIN_PY_FILE }}
        shell: bash

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-win-x64
          path: dist/
          retention-days: 1

  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - name: Check architecture
        run: |
          if [ "$(uname -m)" != "x86_64" ]; then
            echo "Unexpected architecture: $(uname -m)" && exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10.x

      - name: Install dependencies
        run: |
          pip install pyinstaller
          sudo apt update && sudo apt install -y zip

      - name: Clean previous builds
        run: |
          rm -rf dist/ build/

      - name: Build shellx executable
        run: |
          pyinstaller --clean --onefile --name "${{ env.APP_NAME }}" ${{ env.MAIN_PY_FILE }}

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-x86_64
          path: dist/
          retention-days: 1

  build-macos-x86_64:
    runs-on: macos-15  # ARM64 runner, building x86_64 binaries via Rosetta 2
    steps:
      - name: Check architecture (ARM64 runner expected)
        run: |
          if [ "$(uname -m)" != "arm64" ]; then
            echo "Unexpected architecture: $(uname -m)" && exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install x86_64 Python via Rosetta 2
        run: |
          # Download and install x86_64 Python using Rosetta 2
          arch -x86_64 /bin/bash -c "
            echo 'Installing x86_64 Python via Rosetta 2...'
            curl -fsSL https://www.python.org/ftp/python/3.10.11/python-3.10.11-macosx10.9.pkg -o python.pkg
            sudo installer -pkg python.pkg -target /
            export PATH=/usr/local/bin:/Library/Frameworks/Python.framework/Versions/3.10/bin:$PATH
            python3 --version
            python3 -m pip install --upgrade pip
            python3 -m pip install pyinstaller
          "

      - name: Install system dependencies
        run: |
          # Install dependencies that work on both architectures
          brew install zip

      - name: Clean previous builds
        run: |
          rm -rf dist/ build/

      - name: Build shellx executable (x86_64)
        run: |
          # Force x86_64 architecture using Rosetta 2
          arch -x86_64 /bin/bash -c "
            export PATH=/usr/local/bin:/Library/Frameworks/Python.framework/Versions/3.10/bin:$PATH
            cd $(pwd)
            pyinstaller --clean --onefile --name '${{ env.APP_NAME }}' ${{ env.MAIN_PY_FILE }}
          "

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-x86_64
          path: dist/
          retention-days: 1

  build-macos-aarch64:
    runs-on: macos-latest  # Apple Silicon (aarch64)
    steps:
      - name: Check architecture
        run: |
          if [ "$(uname -m)" != "arm64" ]; then
            echo "Unexpected architecture: $(uname -m)" && exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10.x

      - name: Install dependencies
        run: |
          pip install pyinstaller
          brew install zip

      - name: Clean previous builds
        run: |
          rm -rf dist/ build/

      - name: Build shellx executable
        run: |
          pyinstaller --clean --onefile --name "${{ env.APP_NAME }}" ${{ env.MAIN_PY_FILE }}

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-aarch64
          path: dist/
          retention-days: 1

  # -------------------------- Packaging Stage: Integrate intermediate artifacts and generate final zip packages --------------------------
  package-win-x86:
    needs: build-windows-x86
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-win-x86
          path: dist/

      - name: Package as zip
        run: |
          VERSION=${{ env.VERSION }}
          ZIP_NAME="${{ env.APP_NAME }}-win-x86-${VERSION}.zip"
          cd dist && zip -r ../${ZIP_NAME} ./*

      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-win-x86-${{ env.VERSION }}
          path: ./*.zip
          retention-days: 7

  package-win-x64:
    needs: build-windows-x64
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-win-x64
          path: dist/

      - name: Package as zip
        run: |
          VERSION=${{ env.VERSION }}
          ZIP_NAME="${{ env.APP_NAME }}-win-x64-${VERSION}.zip"
          cd dist && zip -r ../${ZIP_NAME} ./*

      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-win-x64-${{ env.VERSION }}
          path: ./*.zip
          retention-days: 7

  package-linux-x86_64:
    needs: build-linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-linux-x86_64
          path: dist/

      - name: Fix permissions
        run: chmod +x dist/*

      - name: Package as zip
        run: |
          VERSION=${{ env.VERSION }}
          ZIP_NAME="${{ env.APP_NAME }}-linux-x86_64-${VERSION}.zip"
          cd dist && zip -r ../${ZIP_NAME} ./*

      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-x86_64-${{ env.VERSION }}
          path: ./*.zip
          retention-days: 7

  package-macos-x86_64:
    needs: build-macos-x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-macos-x86_64
          path: dist/

      - name: Fix permissions
        run: chmod +x dist/*

      - name: Package as zip
        run: |
          VERSION=${{ env.VERSION }}
          ZIP_NAME="${{ env.APP_NAME }}-macos-x86_64-${VERSION}.zip"
          cd dist && zip -r ../${ZIP_NAME} ./*

      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-x86_64-${{ env.VERSION }}
          path: ./*.zip
          retention-days: 7

  package-macos-aarch64:
    needs: build-macos-aarch64
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-macos-aarch64
          path: dist/

      - name: Fix permissions
        run: chmod +x dist/*

      - name: Package as zip
        run: |
          VERSION=${{ env.VERSION }}
          ZIP_NAME="${{ env.APP_NAME }}-macos-aarch64-${VERSION}.zip"
          cd dist && zip -r ../${ZIP_NAME} ./*

      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-aarch64-${{ env.VERSION }}
          path: ./*.zip
          retention-days: 7

  # -------------------------- Release Summary: Collect all final artifacts --------------------------
  release:
    needs:
      - package-win-x86
      - package-win-x64
      - package-linux-x86_64
      - package-macos-x86_64
      - package-macos-aarch64
    runs-on: ubuntu-latest
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: release/

      - name: Generate checksums
        run: |
          cd release
          # Generate checksums for ZIP files
          find . -type f -name "*.zip" -exec sh -c 'for file do sha256sum "$file" > "$file.sha256"; done' sh {} +

          # Display all files in release directory
          echo "Files in release directory:"
          find . -type f | sort

      - name: Upload all releases
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-all-releases-${{ env.VERSION }}
          path: release/
          retention-days: 30
