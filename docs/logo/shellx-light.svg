<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal window background -->
  <rect x="2" y="6" width="116" height="28" rx="4" fill="#f8f9fa" stroke="#333" stroke-width="1"/>
  
  <!-- Terminal window header -->
  <rect x="2" y="6" width="116" height="8" rx="4" fill="#333"/>
  <rect x="2" y="6" width="116" height="4" rx="4" fill="#333"/>
  
  <!-- Terminal window buttons -->
  <circle cx="8" cy="10" r="1.5" fill="#ff5f56"/>
  <circle cx="14" cy="10" r="1.5" fill="#ffbd2e"/>
  <circle cx="20" cy="10" r="1.5" fill="#27ca3f"/>
  
  <!-- Terminal prompt -->
  <text x="8" y="25" font-family="Monaco, monospace" font-size="8" fill="#333">$</text>
  
  <!-- ShellX.ai text -->
  <text x="30" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000">
    Shell<tspan fill="#333">X</tspan><tspan fill="#666">.ai</tspan>
  </text>
  
  <!-- AI indicator -->
  <circle cx="100" cy="20" r="3" fill="#00ff00" opacity="0.7"/>
  <circle cx="100" cy="20" r="2" fill="#00ff00"/>
  
  <!-- Cursor blink animation -->
  <rect x="85" y="18" width="1" height="8" fill="#333">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>